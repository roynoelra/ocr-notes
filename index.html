<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>OCR for Notes - Powered by Gemini</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

        :root {
            --bg: #0f0f10;
            --surface: #1a1a1d;
            --surface2: #242428;
            --border: #2e2e35;
            --accent: #f5c842;
            --text: #f0efe8;
            --muted: #7a7a85;
            --success: #4caf7d;
            --error: #e05252;
            --radius: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; padding: 0 0 40px; }

        header { width: 100%; padding: 18px 20px 14px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
        .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        header h1 { font-family: 'Space Mono', monospace; font-size: 16px; letter-spacing: -0.5px; }
        header span { font-size: 11px; color: var(--muted); }

        .container { width: 100%; max-width: 480px; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }

        .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 40px 20px; text-align: center; cursor: pointer; background: var(--surface); position: relative; transition: 0.3s; }
        .upload-zone:hover { border-color: var(--accent); background: var(--surface2); }
        .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
        
        #preview-wrap { display: none; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); position: relative; }
        #preview-img { width: 100%; display: block; max-height: 320px; object-fit: contain; background: var(--surface2); }

        .btn-analyze { width: 100%; padding: 16px; background: var(--accent); color: #0f0f10; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-analyze:active { transform: scale(0.98); }
        .btn-analyze:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }

        .status { display: none; align-items: center; justify-content: center; gap: 10px; font-size: 14px; color: var(--accent); margin: 10px 0; }
        .spinner { width: 20px; height: 20px; border: 3px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .field-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; margin-bottom: 10px; position: relative; transition: 0.2s; }
        .field-card:hover { border-color: var(--muted); }
        .field-label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-family: 'Space Mono', monospace; margin-bottom: 4px; }
        .field-value { font-size: 14px; font-weight: 500; line-height: 1.4; color: var(--text); }
        
        .copied-toast { position: absolute; right: 15px; background: var(--success); color: white; font-size: 10px; padding: 4px 8px; border-radius: 4px; opacity: 0; transition: opacity 0.2s; font-weight: bold; }
        .copied-toast.show { opacity: 1; }

        .error-box { display: none; background: rgba(224, 82, 82, 0.1); border: 1px solid var(--error); border-radius: 12px; padding: 15px; color: #ffbaba; font-size: 13px; white-space: pre-wrap; }
        .info-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--surface2); color: var(--accent); margin-left: 5px; }
    </style>
</head>
<body>

<header>
    <div class="logo-icon">⚡</div>
    <div>
        <h1>OCR for Notes <span id="model-badge" class="info-tag">Ready</span></h1>
        <span>AI-Systems by @roynoelra</span>
    </div>
</header>

<div class="container">
    <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/*" capture="environment">
        <span style="font-size: 40px; display: block; margin-bottom: 10px;">📸</span>
        <h3>Pilih atau Ambil Foto</h3>
        <p style="font-size: 12px; color: var(--muted);">Ekstraksi nota otomatis ke JSON</p>
    </div>

    <div id="preview-wrap">
        <img id="preview-img" alt="Preview">
        <button style="width:100%; padding:12px; background:var(--surface2); border:none; color:var(--text); cursor:pointer; font-weight:bold; border-top: 1px solid var(--border);" onclick="document.getElementById('file-input').click()">Ganti Foto</button>
    </div>

    <button class="btn-analyze" id="analyze-btn" disabled>🔍 Analisis Nota Sekarang</button>

    <div class="status" id="status">
        <div class="spinner"></div>
        <span id="status-text">Menghubungi AI...</span>
    </div>

    <div class="error-box" id="error-box"></div>

    <div id="result-section" style="display:none; margin-top: 20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom: 15px; align-items:center;">
            <span style="font-family:'Space Mono'; font-size:11px; color:var(--accent); font-weight:bold;">📋 HASIL EKSTRAKSI</span>
            <button id="copy-all-btn" style="background:var(--accent); border:none; color:#000; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:bold;">Salin Semua</button>
        </div>
        <div id="fields-grid"></div>
    </div>
</div>

<script>
// --- KONFIGURASI API (PENAMAAN MODEL DIPERBAIKI) ---
const GEMINI_API_KEY = "AIzaSyBjI6gCmF83yDzWLQOX3tBkCL3Nrgzcsnk"; 
const PRIMARY_MODEL = "gemini-1.5-flash-latest"; // Gunakan 1.5-flash-latest sebagai utama agar stabil
const FALLBACK_MODEL = "gemini-1.5-pro-latest";  // Pro-latest sebagai cadangan

const FIELDS = [
    { key: "no_nota",      label: "No Nota" },
    { key: "periode",       label: "Periode (Bulan)" },
    { key: "nama_barang",   label: "Nama Barang" },
    { key: "nama_toko",     label: "Nama Toko" },
    { key: "alamat_toko",   label: "Alamat Toko" },
    { key: "pay_date",      label: "Pay Date" },
    { key: "quantity",      label: "Quantity" },
    { key: "harga",         label: "Harga" },
];

let currentBase64 = null;
let currentMime = "image/jpeg";
let parsedData = null;

const fileInput = document.getElementById("file-input");
const previewWrap = document.getElementById("preview-wrap");
const previewImg = document.getElementById("preview-img");
const uploadZone = document.getElementById("upload-zone");
const analyzeBtn = document.getElementById("analyze-btn");
const statusEl = document.getElementById("status");
const statusText = document.getElementById("status-text");
const errorBox = document.getElementById("error-box");
const fieldsGrid = document.getElementById("fields-grid");
const resultSection = document.getElementById("result-section");
const modelBadge = document.getElementById("model-badge");

fileInput.addEventListener("change", e => {
    const file = e.target.files[0];
    if (file) {
        currentMime = file.type;
        const reader = new FileReader();
        reader.onload = ev => {
            currentBase64 = ev.target.result.split(",")[1];
            previewImg.src = ev.target.result;
            uploadZone.style.display = "none";
            previewWrap.style.display = "block";
            analyzeBtn.disabled = false;
            resultSection.style.display = "none";
            errorBox.style.display = "none";
            modelBadge.textContent = "Ready";
        };
        reader.readAsDataURL(file);
    }
});

async function callGemini(modelName, base64Data, mimeType) {
    const promptText = `Lakukan OCR pada nota ini dan berikan output HANYA dalam format JSON murni.
    Aturan:
    1. periode: Harus berisi teks: =TEXT([@[PAY DATE]],"mmmm")
    2. Kembalikan JSON saja tanpa penjelasan atau markdown backticks.
    3. Jika data tidak ada, isi "[tidak terbaca]".
    JSON:
    {"no_nota":"","periode":"=TEXT([@[PAY DATE]],\\"mmmm\\")","nama_barang":"","nama_toko":"","alamat_toko":"","pay_date":"","quantity":"","harga":""}`;

    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${GEMINI_API_KEY}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            contents: [{
                parts: [
                    { text: promptText },
                    { inline_data: { mime_type: mimeType, data: base64Data } }
                ]
            }]
        })
    });
    return response;
}

analyzeBtn.addEventListener("click", async () => {
    if (!currentBase64) return;

    analyzeBtn.disabled = true;
    statusEl.style.display = "flex";
    errorBox.style.display = "none";
    resultSection.style.display = "none";
    modelBadge.textContent = "Trying Flash...";
    statusText.textContent = "Memproses dengan Gemini Flash...";

    try {
        let response = await callGemini(PRIMARY_MODEL, currentBase64, currentMime);
        let result = await response.json();

        // JIKA FLASH SIBUK, PINDAH KE PRO
        if (!response.ok && (result.error?.message?.includes("demand") || response.status === 503)) {
            console.warn("Flash Busy, falling back to Pro...");
            modelBadge.textContent = "Flash Busy -> Using Pro";
            statusText.textContent = "Flash padat, beralih ke Gemini Pro...";
            
            response = await callGemini(FALLBACK_MODEL, currentBase64, currentMime);
            result = await response.json();
        }

        if (!response.ok) throw new Error(result.error?.message || `Error ${response.status}: Gagal memproses.`);

        const textResponse = result.candidates[0].content.parts[0].text;
        const cleanedJson = textResponse.replace(/```json|```/gi, "").trim();
        
        parsedData = JSON.parse(cleanedJson);
        renderResult(parsedData);
        resultSection.style.display = "block";
        modelBadge.textContent = "Success";
        resultSection.scrollIntoView({ behavior: 'smooth' });

    } catch (err) {
        errorBox.textContent = "⚠️ " + err.message;
        errorBox.style.display = "block";
        modelBadge.textContent = "Error";
    } finally {
        statusEl.style.display = "none";
        analyzeBtn.disabled = false;
    }
});

function renderResult(data) {
    fieldsGrid.innerHTML = "";
    FIELDS.forEach(({ key, label }) => {
        const val = data[key] || "[tidak terbaca]";
        const card = document.createElement("div");
        card.className = "field-card";
        card.innerHTML = `
            <div style="flex:1">
                <div class="field-label">${label}</div>
                <div class="field-value">${val}</div>
            </div>
            <span class="copied-toast" id="t-${key}">SALIN!</span>
        `;
        card.onclick = () => {
            navigator.clipboard.writeText(val);
            const toast = document.getElementById(`t-${key}`);
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 1000);
        };
        fieldsGrid.appendChild(card);
    });
}

document.getElementById("copy-all-btn").onclick = () => {
    if (!parsedData) return;
    const text = FIELDS.map(f => `${f.label}: ${parsedData[f.key] || '[tidak terbaca]'}`).join("\n");
    navigator.clipboard.writeText(text);
    alert("Semua data berhasil disalin!");
};
</script>
</body>
</html>
